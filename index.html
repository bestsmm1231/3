<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SMM Panel — Instagram / YouTube / Facebook</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI Emoji","Noto Color Emoji","Apple Color Emoji",Arial,sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#fbc2eb,#a18cd1);
    min-height:100vh;
    overflow-x:hidden;
}

h1{
    text-align:center;
    color:#fff;
    padding:20px 10px;
    text-shadow:1px 1px 3px rgba(0,0,0,.4);
}

.platform-box{
    background:#fff;
    border-radius:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.2);
    margin:20px auto;
    padding:20px;
    max-width:480px;
}

.platform-title{
    display:flex;
    align-items:center;
    font-size:1.4em;
    font-weight:bold;
    margin-bottom:15px;
}

.platform-title img{
    width:28px;
    height:28px;
    margin-right:10px;
}

.service{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#f9f9f9;
    border-radius:12px;
    padding:12px 16px;
    margin:8px 0;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
}

.service span{
    font-size:1em;
    font-weight:500;
    color:#333;
}

button{
    background:#0b84ff;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:8px 14px;
    cursor:pointer;
    font-weight:600;
    transition:background .2s;
}

button:hover{
    background:#0969c7;
}

.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.6);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.modal-content{
    background:#fff;
    border-radius:16px;
    padding:20px;
    max-width:400px;
    width:90%;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,.3);
    display:flex;
    flex-direction:column;
    align-items:center;
}

.modal-content h2{
    margin-top:0;
    font-size:1.5em;
    color:#222;
}

.input-field{
    margin:12px 0;
    text-align:center;
    width:100%;
}

.input-field label{
    display:block;
    margin-bottom:6px;
    font-size:.9em;
    color:#444;
}

.input-field input{
    width:80%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
    text-align:left;
    margin-bottom:8px;
}

.qr-code{
    margin:20px 0;
    display:flex;
    justify-content:center;
    width:100%;
}

.close-btn{
    margin-top:15px;
    background:#ccc;
    color:#333;
}

.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#333;
    color:#fff;
    padding:10px 20px;
    border-radius:20px;
    display:none;
}

.big-btn{
    background:#28a745;
    padding:12px 20px;
    font-size:1.1em;
    border:none;
    border-radius:12px;
    color:#fff;
    margin:10px 0;
    cursor:pointer;
    transition:background .2s;
}

.big-btn:hover{
    background:#218838;
}

#qrExpiredMsg{
    font-weight:bold;
    color:#f00;
    margin:10px 0;
}

#reloadQRBtn{
    background:#0b84ff;
    color:#fff;
    padding:10px 18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    margin:10px 0;
}
</style>
</head>

<body>

<h1>🚀cheap Booster Panel</h1>

<div id="services"></div>

<!-- Verify Modal -->
<div class="modal" id="verifyModal">
  <div class="modal-content">
    <h2 id="verifyTitle">Verify</h2>

    <div class="input-field">
      <label id="verifyLabel"></label>
      <input type="text" id="verifyInput">
    </div>

    <button onclick="verifyUser()">Verify</button>
    <button class="close-btn" onclick="closeModal('verifyModal')">Cancel</button>
  </div>
</div>

<!-- QR Modal -->
<div class="modal" id="qrModal">
  <div class="modal-content">

    <h2>📱 Scan to Pay via UPI</h2>

    <div class="qr-code">
      <canvas id="qrcode"></canvas>
    </div>

    <div id="amountDisplay" style="font-size:1.5em;font-weight:bold;"></div>

    <div id="countdown" style="margin:10px 0;font-size:1.2em;color:red;"></div>

    <div class="input-field">
      <label>Enter Payment UTR / TXN ID</label>
      <input type="text" id="utrInput" placeholder="Enter UTR">
    </div>

    <button class="big-btn" onclick="verifyUTR()">✅ Payment Completed</button>

    <div id="qrExpiredMsg" style="display:none;">
      ⚠️ QR expired, please reload
    </div>

    <button id="reloadQRBtn" style="display:none;">🔄 Reload QR</button>

    <button class="close-btn" onclick="closeModal('qrModal')">Cancel</button>

  </div>
</div>

<!-- Payment Failed -->
<div class="modal" id="paymentFailModal">
  <div class="modal-content">
    <h2>❌ Payment not completed</h2>
    <p>Please try again.</p>
    <button onclick="backToQR()">Back</button>
  </div>
</div>

<!-- Payment Success -->
<div class="modal" id="paymentSuccessModal">
  <div class="modal-content">
    <h2>✅ Payment Verified!</h2>

    <p id="successService"></p>
    <p id="successUserInput"></p>

    <p>Your service will be provided soon.</p>

    <button class="big-btn" onclick="closeModal('paymentSuccessModal')">
      OK
    </button>
  </div>
</div>

<div class="toast" id="toast">Verified Successfully ✅</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

const UPI_ID = 'bestsmmhg@naviaxis';
const MERCHANT_NAME = 'cheap Media Booster';

const UTR_PREFIXES = ["OK","UTR","TXN"];

const SERVICES = [

{
platform:'Instagram',
icon:'https://cdn-icons-png.flaticon.com/512/174/174855.png',
items:[
{name:'Instagram 1.5k Followers',price:10,verifyField:{label:'Enter Instagram username',placeholder:'@username'}},
{name:'Instagram 10k Followers',price:69,verifyField:{label:'Enter Instagram username',placeholder:'@username'}},
{name:'Instagram Blue Tick ✔️',price:89,verifyField:{label:'Enter Instagram username',placeholder:'@username'}},
{name:'Instagram 5k Likes',price:19,verifyField:{label:'Enter Post/Reel link',placeholder:'Paste link'}},
{name:'Instagram 10k Reel Views',price:39,verifyField:{label:'Enter Reel link',placeholder:'Paste reel link'}}
]
},

{
platform:'YouTube',
icon:'https://cdn-icons-png.flaticon.com/512/1384/1384060.png',
items:[
{name:'YouTube 1k Subscribers',price:29,verifyField:{label:'Enter Channel Name',placeholder:'Channel name'}},
{name:'YouTube 10k Subscribers',price:249,verifyField:{label:'Enter Channel URL',placeholder:'Paste channel URL'}},
{name:'YouTube 10k Shorts Views',price:25,verifyField:{label:'Enter Video URL',placeholder:'Paste video link'}}
]
},

{
platform:'Facebook',
icon:'https://cdn-icons-png.flaticon.com/512/733/733547.png',
items:[
{name:'Facebook 2k Followers',price:19,verifyField:{label:'Enter Profile Link',placeholder:'Paste link'}},
{name:'Facebook 10k Followers',price:189,verifyField:{label:'Enter Profile Link',placeholder:'Paste link'}},
{name:'Facebook Reel Views',price:49,verifyField:{label:'Enter Reel Link',placeholder:'Paste reel link'}}
]
}

];

let currentService = null;
let timerInterval;

function renderServices(){

const container = document.getElementById('services');

SERVICES.forEach(group=>{

const box = document.createElement('div');
box.className='platform-box';

box.innerHTML = `
<div class="platform-title">
<img src="${group.icon}">
${group.platform}
</div>
`;

group.items.forEach(service=>{

const row = document.createElement('div');
row.className='service';

row.innerHTML = `
<span>${service.name} — ₹${service.price}</span>
<button onclick='openVerify(${JSON.stringify(service)})'>
Buy
</button>
`;

box.appendChild(row);

});

container.appendChild(box);

});

}

function openVerify(service){

currentService = service;

document.getElementById('verifyTitle').innerText =
`Verify ${service.name}`;

document.getElementById('verifyLabel').innerText =
service.verifyField.label;

document.getElementById('verifyInput').placeholder =
service.verifyField.placeholder;

document.getElementById('verifyInput').value='';

document.getElementById('verifyModal').style.display='flex';

}

function closeModal(id){
document.getElementById(id).style.display='none';
}

function showToast(msg){

const toast = document.getElementById('toast');

toast.innerText = msg;
toast.style.display='block';

setTimeout(()=>{
toast.style.display='none';
},2000);

}

function verifyUser(){

const input =
document.getElementById('verifyInput').value.trim();

if(!input){
alert('Please fill the field');
return;
}

closeModal('verifyModal');

showToast('Verified Successfully ✅');

setTimeout(()=>{
openQR();
},500);

}

function openQR(){

const amount = currentService.price;

document.getElementById('amountDisplay').innerText =
`Amount ₹${amount}`;

const upiUrl =
`upi://pay?pa=${UPI_ID}&pn=${MERCHANT_NAME}&am=${amount}&cu=INR`;

const canvas = document.getElementById('qrcode');

canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);

QRCode.toCanvas(canvas, upiUrl, {
width:220
});

document.getElementById('qrModal').style.display='flex';

document.getElementById('qrExpiredMsg').style.display='none';

document.getElementById('reloadQRBtn').style.display='none';

startCountdown(300);

}

function startCountdown(seconds){

clearInterval(timerInterval);

let remaining = seconds;

const countdown =
document.getElementById('countdown');

timerInterval = setInterval(()=>{

remaining--;

const m =
String(Math.floor(remaining/60)).padStart(2,'0');

const s =
String(remaining%60).padStart(2,'0');

countdown.innerText = `⏳ ${m}:${s}`;

if(remaining<=0){

clearInterval(timerInterval);

countdown.innerText='';

document.getElementById('qrcode').style.display='none';

document.getElementById('qrExpiredMsg').style.display='block';

document.getElementById('reloadQRBtn').style.display='inline-block';

}

},1000);

}

document.getElementById('reloadQRBtn').onclick = function(){
openQR();
}

function verifyUTR(){

const utr =
document.getElementById('utrInput')
.value
.trim()
.toUpperCase();

if(!utr){

alert('Please enter UTR');

return;

}

const firstFour = utr.substring(0,4);

if(UTR_PREFIXES.includes(firstFour)){

closeModal('qrModal');

document.getElementById('successService').innerText =
`Service: ${currentService.name}`;

document.getElementById('successUserInput').innerText =
`Input: ${
document.getElementById('verifyInput').value
}`;

document.getElementById('paymentSuccessModal')
.style.display='flex';

}else{

alert('❌ Wrong UTR');

}

}

function backToQR(){

closeModal('paymentFailModal');

openQR();

}

renderServices();

</script>

</body>
</html>
